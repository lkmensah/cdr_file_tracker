# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Increase instances to handle burst traffic and prevent 503 errors.
  maxInstances: 10
  # Keeping minInstances at 0 for cost control, but increasing max helps with reliability.
  # If 503s persist, we recommend setting minInstances to 1 in the Google Cloud Console.
